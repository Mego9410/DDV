services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ddv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ddv}
      POSTGRES_DB: ${POSTGRES_DB:-ddv}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ddv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ddv}:${POSTGRES_PASSWORD:-ddv}@db:5432/${POSTGRES_DB:-ddv}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ddv_data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  ddv_pgdata:
  ddv_data:

